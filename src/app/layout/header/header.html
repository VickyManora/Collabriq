<header class="header">
  <div class="header__left">
    <button class="header__menu-btn" (click)="onToggleMenu()" aria-label="Toggle menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a class="header__logo" routerLink="/dashboard">
      <img src="collabriq_logo.svg" alt="Collabriq" class="header__logo-icon" />
    </a>
  </div>

  <div class="header__right">
    @if (auth.profile(); as profile) {
      <span class="header__user">{{ profile.full_name }}</span>
    }

    <a class="header__profile-btn" routerLink="/profile" aria-label="Edit profile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>

    <div class="header__theme">
      <button class="header__theme-btn" (click)="toggleThemeMenu()" aria-label="Toggle theme">
        @if (theme.mode() === 'dark') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        } @else if (theme.mode() === 'light') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        }
      </button>

      @if (themeMenuOpen()) {
        <div class="header__theme-menu">
          <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'light'" (click)="setTheme('light')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            Light
          </button>
          <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'dark'" (click)="setTheme('dark')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            Dark
          </button>
          <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'system'" (click)="setTheme('system')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            System
          </button>
        </div>
      }
    </div>

    <div class="header__notifications">
      <button class="header__bell-btn" (click)="toggleDropdown()" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        @if (notificationSvc.unreadCount(); as count) {
          <span class="header__badge">{{ count > 9 ? '9+' : count }}</span>
        }
      </button>

      @if (dropdownOpen()) {
        <div class="header__dropdown">
          <div class="header__dropdown-header">
            <span class="header__dropdown-title">Notifications</span>
            @if (notificationSvc.unreadCount()) {
              <button class="header__dropdown-mark-all" (click)="onMarkAllRead()">Mark all read</button>
            }
          </div>

          <div class="header__dropdown-list">
            @for (n of notificationSvc.notifications(); track n.id) {
              <button
                class="header__dropdown-item"
                [class.header__dropdown-item--unread]="!n.is_read"
                (click)="onNotificationClick(n.id)"
              >
                <span class="header__dropdown-item-msg">{{ n.message }}</span>
                <span class="header__dropdown-item-time">{{ n.created_at | date:'MMM d, h:mm a' }}</span>
              </button>
            } @empty {
              <div class="header__dropdown-empty">No notifications yet</div>
            }
          </div>
        </div>
      }
    </div>

    <button class="header__logout" (click)="onLogout()">Logout</button>
  </div>
</header>
