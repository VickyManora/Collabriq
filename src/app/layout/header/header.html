<header class="header">
  <div class="header__left">
    <button class="header__menu-btn" (click)="onToggleMenu()" aria-label="Toggle menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a class="header__logo" routerLink="/dashboard">
      <img [src]="theme.isDark() ? 'assets/logo/collabriq_logo_darkmode.svg' : 'collabriq_logo.svg'" alt="Collabriq" class="header__logo-icon" />
    </a>
  </div>

  <div class="header__right">
    <!-- Notifications -->
    <div class="header__notifications">
      <button class="header__icon-btn" (click)="toggleNotifications()" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        @if (notificationSvc.unreadCount(); as count) {
          <span class="header__badge">{{ count > 9 ? '9+' : count }}</span>
        }
      </button>

      @if (openPanel() === 'notifications') {
        <div class="header__dropdown">
          <div class="header__dropdown-header">
            <span class="header__dropdown-title">Notifications</span>
            @if (notificationSvc.unreadCount()) {
              <button class="header__dropdown-mark-all" (click)="onMarkAllRead()">Mark all read</button>
            }
          </div>

          <div class="header__dropdown-list">
            @for (n of notificationSvc.notifications(); track n.id) {
              <button
                class="header__dropdown-item"
                [class.header__dropdown-item--unread]="!n.is_read"
                (click)="onNotificationClick(n.id)"
              >
                <span class="header__dropdown-item-icon header__dropdown-item-icon--{{ notificationSvc.getNotificationIcon(n.type) }}">
                  @switch (notificationSvc.getNotificationIcon(n.type)) {
                    @case ('check-circle') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg> }
                    @case ('x-circle') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> }
                    @case ('clipboard') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg> }
                    @case ('file-plus') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M12 18v-6M9 15h6"/></svg> }
                    @case ('file-minus') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M9 15h6"/></svg> }
                    @case ('handshake') { <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3C19.5 3 22 5.5 22 8.5c0 3.8-3.4 6.9-8.5 11.6L12 21.4l-1.5-1.4C5.4 15.4 2 12.3 2 8.5 2 5.5 4.5 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3z"/></svg> }
                    @case ('flag') { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> }
                    @case ('star') { <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> }
                    @default { <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> }
                  }
                </span>
                <div class="header__dropdown-item-body">
                  <span class="header__dropdown-item-msg">{{ n.message }}</span>
                  <span class="header__dropdown-item-time">{{ n.created_at | date:'MMM d, h:mm a' }}</span>
                </div>
              </button>
            } @empty {
              <div class="header__dropdown-empty">No notifications yet</div>
            }
          </div>
        </div>
      }
    </div>

    <!-- Profile avatar -->
    <div class="header__profile">
      <button class="header__avatar" (click)="toggleProfileMenu()" aria-label="Profile menu">
        {{ userInitials() }}
      </button>

      @if (openPanel() === 'profile') {
        <div class="header__profile-menu">
          <a class="header__profile-item" routerLink="/profile" (click)="closePanel()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Edit Profile
          </a>

          <div class="header__profile-divider"></div>

          <button class="header__profile-item" (click)="toggleThemeExpanded()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @if (theme.isDark()) {
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              } @else {
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              }
            </svg>
            Theme
            <svg class="header__profile-chevron" [class.header__profile-chevron--open]="themeExpanded()" width="12" height="12" viewBox="0 0 12 12"><path fill="currentColor" d="M6 8L1 3h10z"/></svg>
          </button>

          @if (themeExpanded()) {
            <div class="header__theme-options">
              <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'light'" (click)="setTheme('light')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                Light
              </button>
              <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'dark'" (click)="setTheme('dark')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                Dark
              </button>
              <button class="header__theme-option" [class.header__theme-option--active]="theme.mode() === 'system'" (click)="setTheme('system')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                System
              </button>
            </div>
          }

          <div class="header__profile-divider"></div>

          <button class="header__profile-item header__profile-item--danger" (click)="onLogout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </button>
        </div>
      }
    </div>
  </div>
</header>
