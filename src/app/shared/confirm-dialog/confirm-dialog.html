@if (visible) {
  <div class="confirm-dialog__overlay" (click)="onBackdropClick()">
    <div class="confirm-dialog__card" (click)="$event.stopPropagation()">
      <p class="confirm-dialog__message">{{ message }}</p>
      <div class="confirm-dialog__actions">
        <button class="confirm-dialog__cancel-btn" (click)="onCancel()">Cancel</button>
        <button class="confirm-dialog__confirm-btn" (click)="onConfirm()">Confirm</button>
      </div>
    </div>
  </div>
}
