<div class="auth-page">
  <div class="auth-card">
    <img src="logo_with_name.png" alt="Collabriq" class="auth-card__logo" />
    <h1>Welcome back</h1>
    <p class="auth-card__subtitle">Sign in to Collabriq</p>

    @if (error()) {
      <div class="auth-card__error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Your password"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-card__footer">
      Don't have an account? <a routerLink="/auth/signup">Sign up</a>
    </p>
  </div>
</div>
