<div class="auth-page">
  <div class="auth-card">
    <img [src]="theme.isDark() ? 'assets/logo/collabriq_logo_darkmode.svg' : 'assets/logo/collabriq_logo.svg'" alt="Collabriq" class="auth-card__logo" />
    <h1>Forgot password</h1>
    <p class="auth-card__subtitle">Enter your email to receive a reset link</p>

    @if (submitted()) {
      <div class="auth-card__success">
        If an account exists for this email, you will receive a password reset link.
      </div>
      <p class="auth-card__footer">
        <a routerLink="/auth/login">Back to sign in</a>
      </p>
    } @else {
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading()">
          {{ loading() ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <p class="auth-card__footer">
        Remember your password? <a routerLink="/auth/login">Sign in</a>
      </p>
    }
  </div>
</div>
